apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd
  namespace: argocd
  annotations:
    argocd.argoproj.io/manifest-generate-paths: .
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: argocd
    name: in-cluster
  project: argocd
  syncPolicy:
    automated:
      prune: true
      allowEmpty: true
      selfHeal: true
    syncOptions:
      - ServerSideApply=true
  ignoreDifferences:
    - kind: Secret
      name: argocd-secret
      namespace: argocd
      jsonPointers:
        - /data/webhook.github.secret
  sources:
    - chart: argo-cd
      repoURL: https://argoproj.github.io/argo-helm
      targetRevision: 9.7.0
      helm:
        values: |
          global:
            revisionHistoryLimit: 3
          secret:
            githubSecret: $github-webhook:token
          configs:
            cm:
              exec.enabled: "true"
            params:
              application.namespaces: "argocd, zero-two, zero-two-*"
              server.insecure: "true"
              applicationsetcontroller.enable.policy.override: "true"
              controller.sync.timeout.seconds: "1800" # 30 mins
    - path: charts/argocd-resources
      {{- include "infra-repository-values" . | nindent 6 }}
      helm:
        values: |
          hostname: {{ .Values.argocd.hostname }}
