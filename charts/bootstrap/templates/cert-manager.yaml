apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: cert-manager
  namespace: argocd
  annotations:
    argocd.argoproj.io/manifest-generate-paths: .
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: cert-manager
  sources:
    - chart: cert-manager
      repoURL: https://charts.jetstack.io
      targetRevision: v1.19.3
      helm:
        parameters:
          - name: installCRDs
            value: "true"
    - chart: trust-manager
      repoURL: https://charts.jetstack.io
      targetRevision: v0.20.3
      helm:
        releaseName: trust-manager
    - path: charts/certificates
      {{- include "infra-repository-values" . | nindent 6 }}
  destination:
    namespace: cert-manager
    name: in-cluster
  syncPolicy:
    automated:
      prune: true
      allowEmpty: true
      selfHeal: true
    syncOptions:
      - Validate=false
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
