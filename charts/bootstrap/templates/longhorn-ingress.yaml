{{- if .Values.longhorn.enabled }}
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: longhorn
  namespace: longhorn-system
  annotations:
    argocd.argoproj.io/sync-wave: "1"
spec:
  entryPoints:
    - websecure
  routes:
    - kind: Rule
      match: Host(`{{ .Values.longhorn.hostname }}`)
      priority: 10
      services:
        - name: longhorn-frontend
          port: 80
{{- end }}
