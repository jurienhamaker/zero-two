apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: structure
  namespace: zero-two
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  destinations:
    - namespace: structure
      name: in-cluster
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  sourceNamespaces:
    - zero-two
  sourceRepos:
    - {{ .Values.repoURL }}
