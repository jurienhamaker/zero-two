{{- if .Values.speedtestTracker.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: speedtest-tracker
  namespace: argocd
  annotations:
    argocd.argoproj.io/manifest-generate-paths: .
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: speedtest-tracker
    name: in-cluster
  project: speedtest-tracker
  syncPolicy:
    automated:
      prune: true
      allowEmpty: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - ServerSideApply=true
  sources:
    - chart: speedtest-tracker
      repoURL: oci://ghcr.io/harish2k01/helm-charts/speedtest-tracker
      targetRevision: 0.1.3
      helm:
        values: |
          speedtestTracker:
            secrets:
              existingSecret: speedtest-tracker-secret
            ingress:
              enabled: true
              className: nginx
              hosts:
                - host: {{ .Values.speedtestTracker.hostname }} 
                  paths:
                    - path: /
                      pathType: Prefix
{{ end }}
