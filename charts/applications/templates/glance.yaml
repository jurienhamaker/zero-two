                                          url: "https://radarr.zero-two.xyz"
                                          icon: sh:radarr
                                        - title: SABnzbd
                                          url: "https://sabnzbd.zero-two.xyz"
                                          icon: sh:sabnzbd
                                        - title: qBittorrent
                                          url: "https://torrent.zero-two.xyz"
                                          icon: sh:qbittorrent
                                        - title: Home-Assistant
                                          url: "https://home.zero-two.xyz"
                                          icon: sh:home-assistant
