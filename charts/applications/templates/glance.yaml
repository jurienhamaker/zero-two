                                    - type: custom-api
                                      cache: 1h
                                      title: Internet Speed
                                      title-url: ${SPEEDTEST_URL}
                                      url: ${SPEEDTEST_URL}/api/v1/results/latest
                                      headers:
                                        Authorization: Bearer ${SPEEDTEST_TRACKER_API_TOKEN}
                                        Accept: application/json
                                      subrequests:
