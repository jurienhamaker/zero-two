apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: prometheus
  namespace: argocd
  annotations:
    argocd.argoproj.io/manifest-generate-paths: .
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: prometheus 
    name: in-cluster
  project: default
  syncPolicy:
    automated:
      prune: true
      allowEmpty: true
      selfHeal: true
    syncOptions:
      - SkipDryRunOnMissingResource=true
      - ServerSideApply=true
  sources:
    - chart: kube-prometheus-stack
      repoURL: https://prometheus-community.github.io/helm-charts
      targetRevision: 87.5.1
      helm:
        values: |
          grafana:
            enabled: false

          kubeProxy:
            enabled: false

          prometheus:
            agentMode: true

            ingress:
              enabled: true
              ingressClassName: traefik
              hosts:
                - {{ $.Values.prometheus.hostname }}

            prometheusSpec:
              remoteWrite:
                - url: http://openobserve.openobserve.svc.cluster.local/api/default/prometheus/api/v1/write
                  basicAuth:
                    username:
                      name: openobserve-credentials
                      key: username
                    password:
                      name: openobserve-credentials
                      key: password
    - path: charts/resources/prometheus
      {{- include "infra-repository-values" . | nindent 6 }}
