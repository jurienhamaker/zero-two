{{- if .Values.enabled.downloadStack }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: download-stack
  namespace: argocd
  annotations:
    argocd.argoproj.io/manifest-generate-paths: .
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: zero-two
    name: in-cluster
  project: download-stack
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
  sources:
    - path: charts/download-stack
      {{- include "infra-repository-values" . | nindent 6 }}
{{- end }}
