apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: sabnzbd
  namespace: argocd
  annotations:
    argocd.argoproj.io/manifest-generate-paths: .
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: servarr
    name: in-cluster
  project: servarr
  syncPolicy:
    automated:
      prune: true
      allowEmpty: true
      selfHeal: false
    syncOptions:
      - SkipDryRunOnMissingResource=true
      - ServerSideApply=true
  sources:
    - path: .
      repoURL: oci://oci.trueforge.org/truecharts/sabnzbd
      targetRevision: 25.3.0
      helm:
        values: |
          global:
            fallbackDefaults:
              storageClass: nfs-k8s

          ingress:
            main:
              enabled: true
              ingressClassName: traefik
              hosts:
                - host: {{ .Values.servarr.sabnzbd.hostname }}
                  paths:
                    - path: /
                      pathType: ImplementationSpecific
              integrations:
                traefik:
                  enabled: true

          persistence:
            nfs-media:
              enabled: true
              type: pvc
              mountPath: /media
              targetSelectAll: true
              static:
                mode: nfs
                share: "/mnt/zero-two/media"
                server: {{ .Values.nfs.server | quote  }}

          workload:
            main:
              podSpec:
                containers:
                  main:
                    env:
                      SABNZBD__HOST_WHITELIST_ENTRIES: {{ .Values.servarr.sabnzbd.hostname | quote }}
