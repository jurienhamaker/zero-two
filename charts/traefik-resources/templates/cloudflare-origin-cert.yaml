apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: cloudflare-origin-cert
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: "24h0m0s"
  secretStoreRef:
    name: op-secret-store
    kind: ClusterSecretStore
  target:
    name: cloudflare-origin-cert
    creationPolicy: Owner
    template:
      type: kubernetes.io/tls
  data:
    - secretKey: tls.crt
      remoteRef:
        key: "cloudflare-origin-cert/{{ .Values.domain }}/tls.crt"
    - secretKey: tls.key
      remoteRef:
        key: "cloudflare-origin-cert/{{ .Values.domain }}/tls.key"

