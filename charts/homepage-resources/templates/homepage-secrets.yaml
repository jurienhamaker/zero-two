apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage-secrets
  namespace: homepage
  annotations:
    argocd.argoproj.io/sync-wave: "-1"
spec:
  refreshInterval: 24h0m0s
  secretStoreRef:
    name: op-secret-store
    kind: ClusterSecretStore
  target:
    name: homepage-secrets
    template:
      metadata:
        labels:
          app.kubernetes.io/part-of: argocd
    creationPolicy: Owner
  data:
  - secretKey: homeassistant
    remoteRef:
      key: "homepage-secrets/homeassistant/key"
      conversionStrategy: Default
      metadataPolicy: None
      decodingStrategy: None
  - secretKey: proxmox-token-id 
    remoteRef:
      key: "homepage-secrets/proxmox/token-id"
      conversionStrategy: Default
      metadataPolicy: None
      decodingStrategy: None
  - secretKey: proxmox-token-secret
    remoteRef:
      key: "homepage-secrets/proxmox/token-secret"
      conversionStrategy: Default
      metadataPolicy: None
      decodingStrategy: None
  - secretKey: pihole-key
    remoteRef:
      key: "homepage-secrets/pihole/key"
      conversionStrategy: Default
      metadataPolicy: None
      decodingStrategy: None
  - secretKey: truenas-key
    remoteRef:
      key: "homepage-secrets/truenas/key"
      conversionStrategy: Default
      metadataPolicy: None
      decodingStrategy: None
  - secretKey: jellyfin-key
    remoteRef:
      key: "homepage-secrets/media/jellyfin-key"
      conversionStrategy: Default
      metadataPolicy: None
      decodingStrategy: None
  - secretKey: sabnzbd-key
    remoteRef:
      key: "homepage-secrets/media/sabnzbd-key"
      conversionStrategy: Default
      metadataPolicy: None
      decodingStrategy: None
  - secretKey: qbittorrent-username
    remoteRef:
      key: "homepage-secrets/media/qbittorrent-username"
      conversionStrategy: Default
      metadataPolicy: None
      decodingStrategy: None
  - secretKey: qbittorrent-password
    remoteRef:
      key: "homepage-secrets/media/qbittorrent-password"
      conversionStrategy: Default
      metadataPolicy: None
      decodingStrategy: None
  - secretKey: prowlarr-key
    remoteRef:
      key: "homepage-secrets/media/prowlarr-key"
      conversionStrategy: Default
      metadataPolicy: None
      decodingStrategy: None
  - secretKey: sonarr-key
    remoteRef:
      key: "homepage-secrets/media/sonarr-key"
      conversionStrategy: Default
      metadataPolicy: None
      decodingStrategy: None
  - secretKey: radarr-key
    remoteRef:
      key: "homepage-secrets/media/radarr-key"
      conversionStrategy: Default
      metadataPolicy: None
      decodingStrategy: None
  - secretKey: seerr-key
    remoteRef:
      key: "homepage-secrets/media/seerr-key"
      conversionStrategy: Default
      metadataPolicy: None
      decodingStrategy: None

