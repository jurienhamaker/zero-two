{{- if .Values.jellyfin.enabled }}
apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: jellyfin
  namespace: argocd
  annotations:
    argocd.argoproj.io/manifest-generate-paths: .
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    namespace: jellyfin
    name: in-cluster
  project: jellyfin
  syncPolicy:
    automated:
      prune: true
      allowEmpty: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
      - SkipDryRunOnMissingResource=true
      - ServerSideApply=true
  sources:
{{- with .Values.jellyfin }}
    - chart: jellyfin
      repoURL: https://jellyfin.github.io/jellyfin-helm 
      targetRevision: 3.2.0
      helm:
        values: |
          persistence:
            config:
              storageClass: nfs-k8s
            media:
              storageClass: nfs-k8s
            cache:
              storageClass: nfs-k8s
          ingress:
            enabled: true
            className: traefik
            hosts:
              - host: {{ .hostname }} 
                paths:
                  - path: /
                    pathType: Prefix
          volumes:
            - name: nfs-media
              nfs:
                server: {{ $.Values.jellyfin.nfs.server }}
                path: /mnt/zero-two/media
          
          volumeMounts:
            - mountPath: /mnt/media
              name: nfs-media
{{- end }}
{{- end }}
